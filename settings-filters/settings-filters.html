<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title id="config-title"></title>
    <link rel="stylesheet" href="./settings-filters.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <main class="container">
        <form id="filter-form">
            <h3 class="section-title"><i class="bi bi-funnel"></i> <span id="filter-list-title"></span></h3>

            <section id="adblock-status" class="status-card">
                <div class="status-header">
                    <div class="status-title">
                        <i class="bi bi-shield-check"></i>
                        <span id="adblock-status-title"></span>
                    </div>
                    <button id="reset-adblock-stats" type="button" class="secondary outline"><span id="reset-counters-text"></span></button>
                </div>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="status-label" id="status-state-label"></span>
                        <span id="adblock-state" class="status-value"></span>
                    </div>
                    <div class="status-item">
                        <span class="status-label" id="status-enabled-lists-label"></span>
                        <span id="adblock-enabled-lists" class="status-value"></span>
                    </div>
                    <div class="status-item">
                        <span class="status-label" id="status-checked-label"></span>
                        <span id="adblock-checked" class="status-value"></span>
                    </div>
                    <div class="status-item">
                        <span class="status-label" id="status-blocked-label"></span>
                        <span id="adblock-blocked" class="status-value"></span>
                    </div>
                </div>
                <div id="adblock-hint" class="status-hint"></div>
            </section>

            <section id="filter-list"></section>
            <!-- Video Ad Skipper Settings -->
            <section id="ad-skipper-settings">
                <div class="filter-item ad-skipper-item">
                    <div class="filter-content">
                        <label>
                            <input type="checkbox" id="ad-skipper-enabled">
                            <span id="simple-skipper-label"></span>
                        </label>
                        <div class="filter-desc" id="simple-skipper-desc"></div>
                    </div>
                    <select id="ad-skip-speed" aria-label="Skip Speed">
                        <option value="2">2x</option>
                        <option value="4">4x</option>
                        <option value="6">6x</option>
                        <option value="8">8x</option>
                    </select>
                </div>
            </section>
            <footer>
                <a href="#" id="add-filter" role="button" class="outline add-filter-green">
                    <i class="bi bi-plus-circle"></i> 
                    <span id="add-filter-text"></span>
                </a>
                <a href="#" id="more-filters" role="button" class="outline more-filters-blue">
                    <i class="bi bi-github"></i> 
                    <span id="more-filters-text"></span>
                </a>
            </footer>
            <div class="controls">
                <button id="reset-button" type="button" class="secondary outline">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    <span id="reset-button-text"></span>
                </button>
                <button id="cancel-button" type="button" class="cancel-red">
                    <i class="bi bi-x-circle"></i>
                    <span id="cancel-button-text"></span>
                </button>
                <button id="save-button" type="button" class="primary">
                    <i class="bi bi-save"></i>
                    <span id="save-button-text"></span>
                </button>
            </div>

            <div id="add-filter-modal" class="modal" hidden>
                <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="add-filter-modal-title">
                    <h3 id="add-filter-modal-title" class="modal-title"></h3>

                    <label class="modal-field">
                        <span id="add-filter-name-label" class="modal-label"></span>
                        <input id="add-filter-name" type="text" autocomplete="off" />
                    </label>

                    <label class="modal-field">
                        <span id="add-filter-url-label" class="modal-label"></span>
                        <input id="add-filter-url" type="text" autocomplete="off" placeholder="https://..." />
                    </label>

                    <div id="add-filter-error" class="modal-error" hidden></div>

                    <div class="modal-actions">
                        <button id="add-filter-cancel" type="button" class="secondary outline">
                            <span id="add-filter-cancel-text"></span>
                        </button>
                        <button id="add-filter-confirm" type="button" class="primary">
                            <span id="add-filter-confirm-text"></span>
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </main>
</body>
<script src="./sf-renderer.js"></script>
</html>
