<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title id="config-title"></title>
    <link rel="stylesheet" href="./settings-filters.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <main class="container">
        <form id="filter-form">
            <h3 class="section-title"><i class="bi bi-funnel"></i> Filter List</h3>
            <section id="filter-list"></section>
            <!-- Video Ad Skipper Settings -->
            <section id="ad-skipper-settings">
                <div class="filter-item ad-skipper-item">
                    <div class="filter-content">
                        <label>
                            <input type="checkbox" id="ad-skipper-enabled">
                            <span>Simple Skipper</span>
                        </label>
                        <div class="filter-desc">Automatically skips video ads at the selected speed.</div>
                    </div>
                    <select id="ad-skip-speed" aria-label="Skip Speed">
                        <option value="2">2x</option>
                        <option value="4">4x</option>
                        <option value="6">6x</option>
                        <option value="8">8x</option>
                    </select>
                </div>
            </section>
            <footer>
                <a href="#" id="add-filter" role="button" class="outline add-filter-green">
                    <i class="bi bi-plus-circle"></i> 
                    <span id="add-filter-text"></span>
                </a>
                <a href="#" id="more-filters" role="button" class="outline more-filters-blue">
                    <i class="bi bi-github"></i> 
                    <span id="more-filters-text"></span>
                </a>
            </footer>
            <div class="controls">
                <button id="reset-button" type="button" class="secondary outline">
                    <i class="bi bi-arrow-counterclockwise"></i>
                    <span id="reset-button-text"></span>
                </button>
                <button id="cancel-button" type="button" class="cancel-red">
                    <i class="bi bi-x-circle"></i>
                    <span id="cancel-button-text"></span>
                </button>
                <button id="save-button" type="button" class="primary">
                    <i class="bi bi-save"></i>
                    <span id="save-button-text"></span>
                </button>
            </div>
        </form>
    </main>
</body>
<script src="./sf-renderer.js"></script>
</html>
