<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Filtros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { 
            padding: 2rem; 
            max-width: 900px;
            margin: auto;
        }
        .filter-item {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .filter-item input[type="text"] {
            flex-grow: 1;
        }
        .filter-item label {
            flex-shrink: 0;
            margin-bottom: 0;
            cursor: pointer;
        }
        .filter-item button {
            margin: 0;
        }
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        #add-filter {
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main class="container">
        <h1 id="config-title"></h1>
        <form id="filter-form">
            <section id="filter-list"></section>
            <footer>
                <a href="#" id="add-filter" role="button" class="secondary outline"></a>
            </footer>
            <div class="controls">
                <button id="reset-button" class="secondary outline"></button>
                <button id="cancel-button" class="secondary"></button>
                <button id="save-button" class="primary"></button>
            </div>
        </form>
    </main>
</body>
<script src="./renderer.js"></script>
</html>
