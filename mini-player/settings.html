<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'">
    <title>Mini Player Settings</title>
    <link rel="stylesheet" href="mini-player.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            height: auto;
            border-radius: 0;
            padding: 12px;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        button,
        input {
            -webkit-app-region: no-drag;
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.95;
            color: var(--text-color);
        }

        .section {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 1px 3px var(--shadow-color);
        }

        .label {
            font-size: 11px;
            opacity: 0.75;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            color: var(--text-color);
            cursor: pointer;
            transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        }

        .option-btn:active {
            transform: scale(0.98);
        }

        .option-btn:hover {
            border-color: var(--text-color);
            opacity: 0.9;
        }

        .option-btn.active {
            border-color: var(--accent-color, #fff);
        }

        .swatch {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            flex: 0 0 auto;
            border: 1px solid var(--border-color);
        }

        .swatch.dark {
            background: #1a1a1a;
        }

        .swatch.light {
            background: #ffffff;
            border: 1px solid #ccc;
        }

        .swatch.blur {
            background: linear-gradient(135deg, #2c3e50, #000);
        }

        .swatch.custom {
            background: linear-gradient(135deg, var(--custom-text-color), var(--custom-emphasis-color), var(--custom-bg-color));
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .row-label {
            font-size: 12px;
            opacity: 0.9;
            color: var(--text-color);
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex: 0 0 auto;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            transition: background 0.15s ease;
        }

        .slider:before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 2px;
            border-radius: 999px;
            background: var(--knob-color);
            border: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            transition: transform 0.15s ease;
        }

        .switch input:checked+.slider {
            background: var(--accent-color);
            border-color: var(--accent-color);
            opacity: 0.8;
        }

        .switch input:checked+.slider:before {
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <div class="panel">
        <div class="title" id="theme-title">Mini player settings</div>

        <div class="section">
            <div class="label" data-i18n="theme">Theme</div>
            <div class="options" id="theme-options">
                <button type="button" class="option-btn" data-theme="dark">
                    <span class="swatch dark"></span>
                    <span data-i18n="theme_dark">Dark</span>
                </button>
                <button type="button" class="option-btn" data-theme="blur">
                    <span class="swatch blur"></span>
                    <span data-i18n="theme_blur">Blur</span>
                </button>
                <button type="button" class="option-btn" data-theme="light">
                    <span class="swatch light"></span>
                    <span data-i18n="theme_light">Light</span>
                </button>
                <button type="button" class="option-btn" data-theme="custom">
                    <span class="swatch custom"></span>
                    <span data-i18n="theme_custom">Custom</span>
                </button>
            </div>
        </div>

        <div class="section">
            <div class="row">
                <span class="row-label" data-i18n="always_on_top">Always on top</span>
                <label class="switch">
                    <input id="always-on-top" type="checkbox" />
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
