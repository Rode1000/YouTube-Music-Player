<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'">
    <title>Mini Player Settings</title>
    <link rel="stylesheet" href="mini-player.css">
    <style>
        body {
            height: auto;
            border-radius: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        #theme-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        #theme-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .theme-opt {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 0 auto;
        }

        .theme-opt:hover {
            transform: scale(1.1);
        }

        .theme-opt.active {
            border-color: var(--accent-color, #fff);
        }

        .theme-label {
            font-size: 10px;
            text-align: center;
            margin-top: 4px;
            color: var(--text-color);
            opacity: 0.8;
        }

        .theme-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body class="midnight">
    <div id="theme-header">
        <span id="theme-title">Mini player settings</span>
    </div>
    <div id="theme-list">
        <div class="theme-item">
            <button class="theme-opt" data-theme="midnight" style="background: #000000;"></button>
            <span class="theme-label" data-i18n="theme_midnight">Midnight</span>
        </div>
        <div class="theme-item">
            <button class="theme-opt" data-theme="blur" style="background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.3);"></button>
            <span class="theme-label" data-i18n="theme_blur">Blur</span>
        </div>
    </div>

    <script src="settings.js"></script>
</body>

</html>
